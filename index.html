<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CCC Check-in">
  <link rel="icon" type="image/jpeg" href="https://i.imgur.com/CA4i39D.jpeg">
  <link rel="apple-touch-icon" href="https://i.imgur.com/CA4i39D.jpeg">
  <title>寻昔纪远 · Check-in</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--gold:#c8a96e;--gold2:rgba(200,169,110,0.4);--dark:#1a0e08;--card-bg:rgba(20,10,5,0.82);--text:#f0e6d3;--muted:rgba(240,230,211,0.5);}
    body{min-height:100vh;background:var(--dark);font-family:'Montserrat',sans-serif;color:var(--text);position:relative;overflow-x:hidden;}
    .bg{position:fixed;top:0;left:0;width:100%;height:100%;background-image:url('https://i.imgur.com/8I0PjjL.jpeg');background-size:cover;background-position:center;opacity:0.35;z-index:0;}
    .view{display:none;min-height:100vh;position:relative;z-index:1;}
    .view.active{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;}
    .login-title{font-family:'Noto Serif SC',serif;font-size:26px;letter-spacing:5px;color:var(--text);margin-bottom:4px;text-align:center;}
    .login-sub{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:36px;text-align:center;}
    .card{background:var(--card-bg);border:1px solid var(--gold2);border-radius:12px;padding:32px 28px;width:100%;max-width:380px;}
    .field-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
    .pin-input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.05);border:1px solid var(--gold2);border-radius:8px;color:var(--text);font-family:'Montserrat',sans-serif;font-size:20px;letter-spacing:6px;text-align:center;outline:none;margin-bottom:20px;}
    .pin-input:focus{border-color:var(--gold);}
    .btn{width:100%;padding:14px;background:rgba(200,169,110,0.15);border:1px solid var(--gold2);border-radius:8px;color:var(--gold);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;}
    .btn:active{opacity:0.7;}
    .btn.gold{background:rgba(200,169,110,0.25);border-color:var(--gold);}
    .btn.small{padding:10px;font-size:11px;margin-top:10px;}
    .error-msg{font-size:11px;color:#c0392b;letter-spacing:1px;text-align:center;margin-top:12px;display:none;}
    #scannerView{justify-content:flex-start;padding:0;}
    .top-bar{width:100%;background:rgba(20,10,5,0.92);border-bottom:1px solid var(--gold2);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .top-bar-info{display:flex;flex-direction:column;}
    .top-role{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}
    .top-name{font-family:'Noto Serif SC',serif;font-size:16px;color:var(--text);letter-spacing:2px;}
    .logout-btn{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);background:none;cursor:pointer;font-family:'Montserrat',sans-serif;padding:6px 10px;border:1px solid rgba(200,169,110,0.2);border-radius:6px;}
    .scanner-body{width:100%;max-width:420px;padding:16px;flex:1;display:flex;flex-direction:column;align-self:center;}
    .session-selector{display:none;margin-bottom:14px;}
    .session-selector.show{display:block;}
    .session-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
    .session-btns{display:flex;gap:8px;}
    .session-btn{flex:1;padding:10px;background:rgba(200,169,110,0.08);border:1px solid var(--gold2);border-radius:8px;color:var(--muted);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all 0.2s;}
    .session-btn.active{background:rgba(200,169,110,0.25);border-color:var(--gold);color:var(--gold);}
    #reader{width:100%;border-radius:12px;overflow:hidden;border:1px solid var(--gold2);background:#000;margin-bottom:12px;}
    #reader video{width:100% !important;}
    #reader img{display:none !important;}
    .scan-hint{font-size:11px;color:var(--muted);text-align:center;letter-spacing:1px;margin-bottom:14px;}
    .result-card{display:none;background:var(--card-bg);border:1px solid var(--gold2);border-radius:12px;padding:28px 24px;text-align:center;margin-bottom:14px;}
    .result-card.show{display:block;}
    .result-icon{font-size:48px;margin-bottom:10px;}
    .result-status{font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;margin-bottom:16px;}
    .result-status.success{color:var(--gold);}
    .result-status.warning{color:#e67e22;}
    .result-status.error{color:#c0392b;}
    .result-divider{width:36px;height:1px;background:var(--gold2);margin:0 auto 16px;}
    .result-name-cn{font-family:'Noto Serif SC',serif;font-size:26px;font-weight:700;color:var(--text);letter-spacing:4px;margin-bottom:4px;}
    .result-name-en{font-size:12px;color:var(--muted);letter-spacing:1px;margin-bottom:6px;}
    .result-role{font-family:'Noto Serif SC',serif;font-size:11px;color:var(--gold);letter-spacing:2px;}
    .result-detail{font-size:10px;color:rgba(200,169,110,0.6);letter-spacing:1px;margin-top:14px;}
    .result-event{font-size:9px;color:rgba(240,230,211,0.25);letter-spacing:2px;text-transform:uppercase;margin-top:20px;}
    .countdown{font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:10px;}
    #statusView{justify-content:flex-start;padding:0;}
    .status-body{width:100%;max-width:560px;padding:16px 16px 80px;align-self:center;overflow-y:auto;}
    .sec-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;margin-top:20px;}
    .sec-title:first-child{margin-top:0;}
    .stat-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
    .stat-box{flex:1;min-width:70px;background:var(--card-bg);border:1px solid var(--gold2);border-radius:8px;padding:12px;text-align:center;}
    .stat-num{font-family:'Noto Serif SC',serif;font-size:24px;color:var(--text);}
    .stat-label{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-top:4px;}
    .team-block{background:var(--card-bg);border:1px solid var(--gold2);border-radius:8px;padding:14px;margin-bottom:10px;}
    .team-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
    .team-name-label{font-family:'Noto Serif SC',serif;font-size:13px;color:var(--text);letter-spacing:2px;}
    .team-count{font-size:10px;color:var(--gold);letter-spacing:1px;}
    .not-checked-list{margin-top:10px;border-top:1px solid rgba(200,169,110,0.15);padding-top:8px;}
    .nci-item{padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;gap:10px;align-items:flex-start;}
    .nci-item:last-child{border-bottom:none;}
    .nci-id{font-size:9px;color:rgba(200,169,110,0.5);letter-spacing:1px;min-width:56px;padding-top:2px;flex-shrink:0;}
    .nci-info{flex:1;}
    .nci-name{font-family:'Noto Serif SC',serif;font-size:13px;color:var(--text);letter-spacing:2px;}
    .nci-detail{font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:2px;}
    .crew-item{background:var(--card-bg);border:1px solid var(--gold2);border-radius:8px;padding:10px 14px;margin-bottom:6px;}
    .crew-item-top{display:flex;justify-content:space-between;align-items:center;}
    .crew-item-name{font-family:'Noto Serif SC',serif;font-size:13px;color:var(--text);letter-spacing:2px;}
    .crew-item-role{font-size:9px;color:var(--muted);letter-spacing:1px;}
    .crew-item-detail{font-size:10px;color:var(--muted);margin-top:3px;}
    .crew-item-id{font-size:9px;color:rgba(200,169,110,0.4);margin-top:2px;}
    .nav-tabs{width:100%;display:none;background:rgba(20,10,5,0.92);border-top:1px solid var(--gold2);position:fixed;bottom:0;left:0;z-index:100;}
    .nav-tabs.show{display:flex;}
    .nav-tab{flex:1;padding:12px 0;background:none;border:none;color:var(--muted);font-family:'Montserrat',sans-serif;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:color 0.2s;}
    .nav-tab.active{color:var(--gold);}
    .loading{position:fixed;inset:0;background:rgba(10,5,2,0.7);display:none;align-items:center;justify-content:center;z-index:999;}
    .loading.show{display:flex;}
    .spinner{width:36px;height:36px;border:2px solid var(--gold2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
<div class="bg"></div>
<div class="loading" id="loading"><div class="spinner"></div></div>

<div class="view active" id="loginView">
  <div class="login-title">寻昔纪远</div>
  <div class="login-sub">Culture Camp 2026 · Check-in System</div>
  <div class="card">
    <div class="field-label">Enter PIN</div>
    <input type="password" class="pin-input" id="pinInput" inputmode="numeric" maxlength="20" placeholder="••••••">
    <button class="btn gold" onclick="doLogin()">Login</button>
    <div class="error-msg" id="loginError">Invalid PIN. Please try again.</div>
  </div>
</div>

<div class="view" id="scannerView">
  <div class="top-bar">
    <div class="top-bar-info">
      <div class="top-role" id="roleLabel"></div>
      <div class="top-name" id="nameLabel"></div>
    </div>
    <button class="logout-btn" onclick="doLogout()">Logout</button>
  </div>
  <div class="scanner-body">
    <div class="session-selector" id="sessionSelector">
      <div class="session-label">Select Session</div>
      <div class="session-btns">
        <button class="session-btn active" id="btnMorning" onclick="selectSession('morning')">Morning</button>
        <button class="session-btn" id="btnAfternoon" onclick="selectSession('afternoon')">Afternoon</button>
      </div>
    </div>
    <div id="reader"></div>
    <div class="scan-hint" id="scanHint">Initialising camera...</div>
    <div class="result-card" id="resultCard">
      <div class="result-icon" id="resultIcon"></div>
      <div class="result-status" id="resultStatus"></div>
      <div class="result-divider" id="resultDivider" style="display:none"></div>
      <div class="result-name-cn" id="resultNameCN"></div>
      <div class="result-name-en" id="resultNameEN"></div>
      <div class="result-role" id="resultRole"></div>
      <div class="result-detail" id="resultDetail"></div>
      <div class="result-event">寻昔纪远 · Culture Camp 2026</div>
      <div class="countdown" id="countdown"></div>
    </div>
    <button class="btn small" onclick="resumeScanner()" id="resumeBtn" style="display:none">Scan Next</button>
  </div>
</div>

<div class="view" id="statusView">
  <div class="top-bar">
    <div class="top-bar-info">
      <div class="top-role" id="roleLabel2"></div>
      <div class="top-name" id="nameLabel2"></div>
    </div>
    <button class="logout-btn" onclick="doLogout()">Logout</button>
  </div>
  <div class="status-body" id="statusBody">
    <div style="text-align:center;padding:40px 0;color:var(--muted);font-size:12px;">Loading...</div>
  </div>
</div>

<div class="nav-tabs" id="navTabs">
  <button class="nav-tab active" id="tabScan" onclick="switchTab('scan')">Scan</button>
  <button class="nav-tab" id="tabStatus" onclick="switchTab('status')">Status</button>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwNniD-7Uwpus7k-ZhWTrGZpeh60qVilmWthAvlXtvkwks5WSXOQrTm1WcVaQCpsQ4A/exec";

let currentRole=null,currentKey=null,currentRoleName=null,currentPin=null,canScan=false;
let selectedSession='morning';
let qrScanner=null,scannerRunning=false,countdownTimer=null;

window.addEventListener('load',()=>{
  const pin=sessionStorage.getItem('ccc_pin');
  const role=sessionStorage.getItem('ccc_role');
  const key=sessionStorage.getItem('ccc_key');
  const name=sessionStorage.getItem('ccc_name');
  const scan=sessionStorage.getItem('ccc_can_scan');
  const sess=sessionStorage.getItem('ccc_session');
  if(pin&&role){
    currentRole=role;currentKey=key;currentRoleName=name;currentPin=pin;
    canScan=scan==='true';
    if(sess)selectedSession=sess;
    enterApp();
  }
});

document.getElementById('pinInput').addEventListener('keypress',e=>{if(e.key==='Enter')doLogin();});

async function doLogin(){
  const pin=document.getElementById('pinInput').value.trim();
  if(!pin)return;
  showLoading(true);
  try{
    const res=await getAPI({action:'verify_pin',pin});
    showLoading(false);
    if(res.success){
      currentRole=res.role;currentKey=res.key;currentRoleName=res.name;currentPin=pin;
      canScan=res.canScan===true;
      sessionStorage.setItem('ccc_pin',pin);
      sessionStorage.setItem('ccc_role',res.role);
      sessionStorage.setItem('ccc_key',res.key);
      sessionStorage.setItem('ccc_name',res.name);
      sessionStorage.setItem('ccc_can_scan',canScan?'true':'false');
      enterApp();
    }else{
      document.getElementById('loginError').textContent='Invalid PIN. Please try again.';
      document.getElementById('loginError').style.display='block';
    }
  }catch(e){
    showLoading(false);
    document.getElementById('loginError').textContent='Connection error. Try again.';
    document.getElementById('loginError').style.display='block';
  }
}

function enterApp(){
  const roleMap={admin:'Admin',registration:'Registration',team:'Team Leader',superleader:'Super Leader'};
  const roleText=roleMap[currentRole]||currentRole;
  ['roleLabel','roleLabel2'].forEach(id=>document.getElementById(id).textContent=roleText);
  ['nameLabel','nameLabel2'].forEach(id=>document.getElementById(id).textContent=currentRoleName);
  if(currentRole==='team')document.getElementById('sessionSelector').classList.add('show');
  if(selectedSession==='afternoon'){
    document.getElementById('btnMorning').classList.remove('active');
    document.getElementById('btnAfternoon').classList.add('active');
  }
  document.getElementById('navTabs').classList.add('show');
  if(canScan){
    document.getElementById('tabScan').style.display='';
    showView('scannerView');
    startScanner();
  }else{
    document.getElementById('tabScan').style.display='none';
    switchTab('status');
  }
}

function selectSession(s){
  selectedSession=s;
  sessionStorage.setItem('ccc_session',s);
  document.getElementById('btnMorning').classList.toggle('active',s==='morning');
  document.getElementById('btnAfternoon').classList.toggle('active',s==='afternoon');
}

function startScanner(){
  if(scannerRunning)return;
  qrScanner=new Html5Qrcode('reader');
  qrScanner.start({facingMode:'environment'},{fps:10,qrbox:{width:240,height:240}},onScanSuccess,()=>{})
  .then(()=>{scannerRunning=true;document.getElementById('scanHint').textContent='Point camera at QR Code';})
  .catch(err=>{document.getElementById('scanHint').textContent='Camera error: '+err;});
}

function stopScanner(){
  if(qrScanner&&scannerRunning){qrScanner.stop().then(()=>{scannerRunning=false;}).catch(()=>{});}
}

function onScanSuccess(decodedText){
  if(qrScanner&&scannerRunning)qrScanner.pause();
  processQR(decodedText);
}

async function processQR(raw){
  let id=raw.trim();
  try{const u=new URL(raw);const p=u.searchParams.get('id');if(p)id=p.trim();}catch(e){}
  let params={id};
  if(currentRole==='admin'){params.action='checkin_crew';params.pin=currentPin;}
  else if(currentRole==='registration'){params.action='checkin_participant';params.pin=currentPin;}
  else if(currentRole==='team'){params.action='checkin_team';params.pin=currentPin;params.session_type=selectedSession;}
  showLoading(true);
  try{
    const res=await getAPI(params);
    showLoading(false);
    showResult(res);
  }catch(e){
    showLoading(false);
    showResult({icon:'❌',status:'Connection Error',nameCN:'',nameEN:'',role:'',detail:''});
  }
}

function showResult(res){
  const icon=res.icon||'❌',status=res.status||'Error';
  const nameCN=res.nameCN||'',nameEN=res.nameEN||'',role=res.role||'',detail=res.detail||'';
  const isSuccess=icon.includes('✅'),isWarn=icon.includes('⚠️');
  const cls=isSuccess?'success':isWarn?'warning':'error';
  document.getElementById('resultIcon').textContent=icon;
  document.getElementById('resultStatus').textContent=status;
  document.getElementById('resultStatus').className='result-status '+cls;
  document.getElementById('resultNameCN').textContent=nameCN;
  document.getElementById('resultNameEN').textContent=nameEN;
  document.getElementById('resultRole').textContent=role;
  document.getElementById('resultDetail').textContent=detail;
  document.getElementById('resultDivider').style.display=nameCN?'block':'none';
  document.getElementById('resultCard').classList.add('show');
  document.getElementById('resumeBtn').style.display='block';
  if(isSuccess)startCountdown(4);
}

function startCountdown(sec){
  clearInterval(countdownTimer);let n=sec;
  document.getElementById('countdown').textContent=`Resuming in ${n}s...`;
  countdownTimer=setInterval(()=>{
    n--;
    if(n<=0){clearInterval(countdownTimer);document.getElementById('countdown').textContent='';resumeScanner();}
    else document.getElementById('countdown').textContent=`Resuming in ${n}s...`;
  },1000);
}

function resumeScanner(){
  clearInterval(countdownTimer);
  document.getElementById('countdown').textContent='';
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('resumeBtn').style.display='none';
  if(qrScanner&&scannerRunning)qrScanner.resume();else startScanner();
}

async function loadStatus(){
  document.getElementById('statusBody').innerHTML='<div style="text-align:center;padding:40px 0;color:var(--muted);font-size:12px;">Loading...</div>';
  try{
    const actionMap={admin:'status_admin',registration:'status_registration',superleader:'status_superleader',team:'status_team'};
    const res=await getAPI({action:actionMap[currentRole],pin:currentPin});
    if(res.success){
      if(currentRole==='admin')renderAdminStatus(res);
      else if(currentRole==='registration'||currentRole==='superleader')renderParticipantStatus(res);
      else if(currentRole==='team')renderTeamStatus(res);
    }else{
      document.getElementById('statusBody').innerHTML=`<div style="text-align:center;padding:40px 0;color:#c0392b;font-size:12px;">${res.error||'Failed to load.'}</div>`;
    }
  }catch(e){
    document.getElementById('statusBody').innerHTML='<div style="text-align:center;padding:40px 0;color:#c0392b;font-size:12px;">Failed to load. '+e+'</div>';
  }
}

function renderAdminStatus(res){
  let html='';
  // Crew overview
  const crewTotal=Number(res.crewTotal)||0;
  const crewCheckedIn=Number(res.crewCheckedIn)||0;
  const crewNotYet=crewTotal-crewCheckedIn;
  const crewDay=res.crewDayLabel||'Today';
  html+=`<div class="sec-title">Crew · ${crewDay}</div>`;
  html+=`<div class="stat-row">
    <div class="stat-box"><div class="stat-num">${crewCheckedIn}</div><div class="stat-label">Checked In</div></div>
    <div class="stat-box"><div class="stat-num">${crewNotYet}</div><div class="stat-label">Not Yet</div></div>
  </div>`;

  // Crew not checked in
  const crewNot=res.crewNotCheckedIn||[];
  if(crewNot.length>0){
    html+=`<div class="sec-title">Crew Not Checked In (${crewNot.length})</div>`;
    crewNot.forEach(p=>{
      html+=`<div class="crew-item">
        <div class="crew-item-top">
          <div class="crew-item-name">${p.nameCN||''}</div>
          <div class="crew-item-role">${p.crewRole||''}</div>
        </div>
        <div class="crew-item-detail">${p.nameEN||''} · 📱${p.phone||'-'}</div>
        <div class="crew-item-id">ID: ${p.id||''}</div>
      </div>`;
    });
  }

  // Participants overview
  const partTotal=Number(res.partTotal)||0;
  const partCheckedIn=Number(res.partTotalCheckedIn)||0;
  const partNotYet=partTotal-partCheckedIn;
  const partSessions=(res.partSessions||[]).join(' / ')||'Today';
  html+=`<div class="sec-title" style="margin-top:24px">Participants · ${partSessions}</div>`;
  html+=`<div class="stat-row">
    <div class="stat-box"><div class="stat-num">${partTotal}</div><div class="stat-label">Total</div></div>
    <div class="stat-box"><div class="stat-num">${partCheckedIn}</div><div class="stat-label">Checked In</div></div>
    <div class="stat-box"><div class="stat-num">${partNotYet}</div><div class="stat-label">Not Yet</div></div>
  </div>`;

  // Participants by team
  html+=`<div class="sec-title">By Team</div>`;
  const teamData=res.partTeamData||{};
  Object.entries(teamData).forEach(([team,info])=>{
    const total=Number(info.total)||0;
    const checked=Number(info.checkedIn)||0;
    const notYet=total-checked;
    html+=`<div class="team-block">
      <div class="team-header">
        <div class="team-name-label">${team}</div>
        <div class="team-count">${checked}/${total}</div>
      </div>
    </div>`;
  });

  document.getElementById('statusBody').innerHTML=html;
}

function renderParticipantStatus(res){
  let html='';
  const total=Number(res.total)||0;
  const checkedIn=Number(res.totalCheckedIn)||0;
  const notYet=total-checkedIn;
  const sessions=(res.sessions||[]).join(' / ')||'Today';

  html+=`<div class="sec-title">${sessions}</div>`;
  html+=`<div class="stat-row">
    <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-label">Total</div></div>
    <div class="stat-box"><div class="stat-num">${checkedIn}</div><div class="stat-label">Checked In</div></div>
    <div class="stat-box"><div class="stat-num">${notYet}</div><div class="stat-label">Not Yet</div></div>
  </div>`;

  html+=`<div class="sec-title">By Team</div>`;
  const teamData=res.teamData||{};
  Object.entries(teamData).forEach(([team,info])=>{
    const tTotal=Number(info.total)||0;
    const tChecked=Number(info.checkedIn)||0;
    const tNotYet=tTotal-tChecked;
    const notList=info.notCheckedIn||[];
    html+=`<div class="team-block">
      <div class="team-header">
        <div class="team-name-label">${team} <span style="font-size:10px;color:var(--muted);font-family:'Montserrat',sans-serif;">(${tTotal}人)</span></div>
        <div class="team-count">${tChecked}/${tTotal}</div>
      </div>`;
    if(notList.length>0){
      html+=`<div class="not-checked-list">`;
      notList.forEach(p=>{
        html+=`<div class="nci-item">
          <div class="nci-id">${p.id||''}</div>
          <div class="nci-info">
            <div class="nci-name">${p.nameCN||''}</div>
            <div class="nci-detail">${p.nameEN||''} · 📱${p.phone||'-'} · 房${p.room||'-'}</div>
          </div>
        </div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
  });

  document.getElementById('statusBody').innerHTML=html;
}

function renderTeamStatus(res){
  let html='';
  const total=Number(res.total)||0;
  const checkedIn=Number(res.checkedIn)||0;
  const notYet=total-checkedIn;
  const teamName=res.teamName||'';
  const sessions=(res.sessions||[]).join(' / ')||'Today';

  html+=`<div class="sec-title">${teamName} · ${sessions}</div>`;
  html+=`<div class="stat-row">
    <div class="stat-box"><div class="stat-num">${checkedIn}</div><div class="stat-label">Checked In</div></div>
    <div class="stat-box"><div class="stat-num">${notYet}</div><div class="stat-label">Not Yet</div></div>
  </div>`;

  const notList=res.notCheckedIn||[];
  if(notList.length>0){
    html+=`<div class="sec-title">Not Checked In (${notList.length})</div>`;
    notList.forEach(p=>{
      html+=`<div class="crew-item">
        <div class="crew-item-top">
          <div class="crew-item-name">${p.nameCN||''}</div>
          <div class="crew-item-id" style="font-size:9px;color:rgba(200,169,110,0.4);">ID: ${p.id||''}</div>
        </div>
        <div class="crew-item-detail">${p.nameEN||''}</div>
        <div class="crew-item-detail">📱 ${p.phone||'-'} · 房号 ${p.room||'-'}</div>
      </div>`;
    });
  }else{
    html+='<div style="text-align:center;padding:16px 0;color:var(--gold);font-size:12px;letter-spacing:1px;">✓ All members checked in!</div>';
  }

  document.getElementById('statusBody').innerHTML=html;
}

function switchTab(tab){
  if(tab==='scan'&&canScan){
    showView('scannerView');
    if(!scannerRunning)startScanner();
    document.getElementById('tabScan').classList.add('active');
    document.getElementById('tabStatus').classList.remove('active');
  }else{
    showView('statusView');
    stopScanner();
    loadStatus();
    document.getElementById('tabStatus').classList.add('active');
    document.getElementById('tabScan').classList.remove('active');
  }
}

function showView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function doLogout(){
  stopScanner();clearInterval(countdownTimer);sessionStorage.clear();
  currentRole=null;currentKey=null;currentRoleName=null;currentPin=null;canScan=false;
  document.getElementById('pinInput').value='';
  document.getElementById('loginError').style.display='none';
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('resumeBtn').style.display='none';
  document.getElementById('sessionSelector').classList.remove('show');
  document.getElementById('navTabs').classList.remove('show');
  document.getElementById('tabScan').style.display='';
  showView('loginView');
}

async function getAPI(params){
  const u=new URL(WEB_APP_URL);
  Object.entries(params).forEach(([k,v])=>u.searchParams.set(k,v));
  const res=await fetch(u.toString());
  return res.json();
}

function showLoading(show){document.getElementById('loading').classList.toggle('show',show);}
</script>
</body>
