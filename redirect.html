<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check-in...</title>
  <style>
    body { background:#1a0e08; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; flex-direction:column; gap:16px; }
    .spinner { width:36px; height:36px; border:2px solid rgba(200,169,110,0.2); border-top-color:#c8a96e; border-radius:50%; animation:spin 0.7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    p { color:rgba(200,169,110,0.5); font-family:sans-serif; font-size:11px; letter-spacing:2px; }
  </style>
</head>
<body>
<div class="spinner"></div>
<p>CHECKING IN...</p>
<script>
  const params = new URLSearchParams(window.location.search);
  const target = params.get('to');
  if (target) {
    window.location.replace(decodeURIComponent(target));
  }
</script>
</body>
</html>
